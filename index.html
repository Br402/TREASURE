<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>WithLIVE Meet &amp; Greet</title>
  <style>
    :root {
      --green: #40d18d;
      --green-dark: #2fbe7a;
      --text: #222;
      --sub: #6f6f73;
      --line: #efefef;
      --blue: #0018ff;
      --red: #d80000;
      --pink: #ff5bb8;
      --pink-dark: #ff3fa6;
    }

    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; height: 100%; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", Helvetica, Arial, "Hiragino Sans", sans-serif;
      background: #fff;
      color: var(--text);
    }

    .phone {
      width: 100%;
      min-height: 100vh;
      background: #fff;
      display: flex;
      flex-direction: column;
    }

    .browser-top {
      height: 72px;
      border-bottom: 1px solid #e9e9e9;
      background: #f7f7f7;
      position: sticky;
      top: 0;
      z-index: 10;
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 8px 16px 10px;
    }

    .browser-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      color: #111;
    }

    .browser-title {
      font-size: 20px;
      font-weight: 800;
      line-height: 1;
      text-align: center;
      flex: 1;
    }

    .browser-url {
      font-size: 12px;
      color: #6f6f73;
      text-align: center;
      margin-top: 4px;
      line-height: 1;
    }

    .browser-icon {
      width: 28px;
      text-align: center;
      font-size: 22px;
      font-weight: 300;
      color: #222;
      flex: 0 0 28px;
    }

    .content {
      flex: 1;
      padding: 18px 18px 30px;
      max-width: 100%;
    }

    .menu {
      font-size: 28px;
      color: #777;
      line-height: 1;
      margin: 12px 0 28px;
    }

    .view { display: none; }
    .view.active { display: block; }

    .event-title {
      font-size: 36px;
      line-height: 1.18;
      font-weight: 900;
      margin: 0 0 24px;
      letter-spacing: -0.03em;
      word-break: keep-all;
    }

    .selected {
      font-size: 26px;
      font-weight: 900;
      margin: 0 0 34px;
      line-height: 1.25;
    }

    .status {
      font-size: 34px;
      line-height: 1;
      font-weight: 900;
      margin: 0 0 28px;
    }

    .status.win { color: var(--red); }
    .status.lose { color: var(--blue); }

    .detail {
      font-size: 24px;
      line-height: 1.42;
      font-weight: 800;
      margin: 0 0 34px;
      word-break: keep-all;
    }

    .btn {
      width: 100%;
      min-height: 46px;
      border-radius: 6px;
      font-size: 16px;
      font-weight: 800;
      border: 1.5px solid var(--green);
      margin-bottom: 14px;
      cursor: pointer;
      background: #fff;
      color: var(--green);
    }

    .btn.primary {
      background: var(--green);
      color: #fff;
      border-color: var(--green);
    }

    .btn.primary:active { background: var(--green-dark); }

    .venue-list {
      margin: 0 0 28px;
      display: grid;
      gap: 18px;
    }

    .venue-item {
      padding: 22px 18px;
      border-radius: 10px;
      background: linear-gradient(180deg, #ff6bc1 0%, #ff4bb1 100%);
      color: #fff;
      text-align: center;
      cursor: pointer;
      line-height: 1.22;
      min-height: 100px;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.22), 0 8px 18px rgba(255,79,176,0.18);
      transition: transform 0.12s ease, background 0.12s ease;
    }

    .venue-item:active { transform: scale(0.99); background: linear-gradient(180deg, #ff5ab7 0%, #ff3fa6 100%); }
    .venue-item.selected { background: #ff4fb0; }

    .venue-item .date {
      font-size: 24px;
      font-weight: 900;
      line-height: 1.08;
      letter-spacing: -0.02em;
      text-shadow: 0 2px 4px rgba(0,0,0,0.18);
      margin-bottom: 4px;
    }

    .venue-item .name {
      font-size: 24px;
      font-weight: 900;
      line-height: 1.1;
      letter-spacing: -0.02em;
      text-shadow: 0 2px 4px rgba(0,0,0,0.18);
      word-break: keep-all;
    }

    .input {
      width: 100%;
      border: 1.5px solid #ddd;
      border-radius: 6px;
      padding: 15px 14px;
      font-size: 17px;
      outline: none;
      margin: 0 0 18px;
    }

    .input:focus {
      border-color: var(--green);
      box-shadow: 0 0 0 3px rgba(64, 209, 141, 0.12);
    }

    .history-card {
      padding: 14px 0;
      border-bottom: 1px solid var(--line);
    }

    .history-card:last-child { border-bottom: none; }
    .history-serial {
      display: inline-block;
      background: #5bc0de;
      color: #fff;
      padding: 2px 6px;
      border-radius: 4px;
      font-size: 10px;
      margin-bottom: 8px;
    }

    .history-time {
      color: #8b8b90;
      font-size: 12px;
      float: right;
      margin-top: 1px;
    }

    .history-title {
      font-size: 16px;
      font-weight: 800;
      margin: 6px 0 4px;
    }

    .history-venue {
      font-size: 14px;
      color: #444;
      margin-bottom: 8px;
    }

    .history-status {
      text-align: center;
      font-size: 20px;
      font-weight: 900;
    }

    .footer-bar {
      height: 86px;
      border-top: 1px solid #ececec;
      background: #fafafa;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 28px;
      color: #222;
      font-size: 34px;
      line-height: 1;
    }

    .footer-bar .ghost { color: #bdbdbd; }

    #loader {
      position: fixed;
      inset: 0;
      background: rgba(255,255,255,0.9);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 50;
    }

    .spinner {
      width: 40px;
      height: 40px;
      border: 4px solid #eee;
      border-top-color: var(--green);
      border-radius: 50%;
      animation: spin .8s linear infinite;
    }


    @media (max-width: 768px) {
      .browser-top {
        height: 64px;
        padding: 6px 14px 8px;
      }

      .browser-title {
        font-size: 18px;
      }

      .browser-url {
        font-size: 11px;
      }

      .content {
        padding: 14px 14px 24px;
      }

      .menu {
        font-size: 24px;
        margin: 8px 0 18px;
      }

      .event-title {
        font-size: 28px;
        line-height: 1.16;
        margin-bottom: 18px;
      }

      .selected {
        font-size: 20px;
        margin-bottom: 24px;
      }

      .venue-list {
        gap: 16px;
        margin-bottom: 18px;
      }

      .venue-item {
        min-height: 98px;
        padding: 18px 16px;
        border-radius: 10px;
      }

      .venue-item .date {
        font-size: 20px;
      }

      .venue-item .name {
        font-size: 19px;
      }

      .input {
        font-size: 16px;
        padding: 14px 13px;
      }

      .btn {
        min-height: 44px;
        font-size: 15px;
        margin-bottom: 12px;
      }

      .footer-bar {
        height: 68px;
        padding: 0 22px;
        font-size: 30px;
      }
    }

    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div id="loader"><div class="spinner"></div></div>

  <div class="phone">
    <div class="browser-top">
      <div class="browser-row">
        <div class="browser-icon">×</div>
        <div class="browser-title">WithLIVE Meet&amp;Greet</div>
        <div class="browser-icon">•••</div>
      </div>
      <div class="browser-url">mg.withlive-app.com</div>
    </div>

    <div class="content">
      <div id="view-step1" class="view active">
        <div class="menu">≡</div>
        <div class="event-title">2026.2.10[Tue] 京セラドーム大阪</div>
        <div class="selected">選択中： TREASURE</div>

        <div class="venue-list" id="venue-options-container"></div>
      </div>

      <div id="view-step2" class="view">
        <div class="menu">≡</div>
        <div class="event-title" style="font-size:30px; margin-bottom:24px;">シリアルコード入力</div>
        <div class="selected" id="selected-venue-display" style="font-size:20px; margin-bottom:24px;"></div>
        <input class="input" type="text" id="serial-input" placeholder="例：qyfJWT22GH5C" maxlength="16" autocomplete="off" />
        <button class="btn primary" id="draw-btn">抽選する</button>
        <button class="btn" id="back-btn">戻る</button>
      </div>

      <div id="view-result" class="view">
        <div class="menu">≡</div>
        <div class="event-title" style="font-size:32px; margin-bottom:26px;" id="res-venue-name"></div>
        <div class="selected" style="font-size:20px; margin-bottom:30px;">選択中： TREASURE</div>
        <div id="res-status"></div>
        <div id="res-text" class="detail"></div>
        <button class="btn primary" id="history-btn">エントリー状況を確認</button>
        <button class="btn" id="home-btn">この賞のトップに戻る</button>
        <button class="btn" id="new-entry-btn">応募ページトップに戻る</button>
      </div>

      <div id="view-history" class="view">
        <div class="menu">≡</div>
        <div style="border-bottom: 3px solid var(--green); padding-bottom: 8px; margin-bottom: 18px; font-size: 18px; font-weight: 900;">応募済み/履歴</div>
        <div id="history-container"></div>
        <button class="btn" style="margin-top:18px;" id="history-home-btn">応募ページトップに戻る</button>
      </div>
    </div>

    <div class="footer-bar">
      <span>‹</span>
      <span class="ghost">›</span>
    </div>
  </div>

  <script>
    const venues = [
      { name: "大阪城ホール", dates: ["2026年7月8日", "2026年7月9日"] },
      { name: "Kアリーナ横浜", dates: ["2026年7月18日", "2026年7月19日", "2026年7月20日"] },
      { name: "GLION ARENA KOBE", dates: ["2026年7月25日", "2026年7月26日"] },
      { name: "IGアリーナ", dates: ["2026年8月1日", "2026年8月2日"] },
      { name: "サンドーム福井", dates: ["2026年8月8日", "2026年8月9日"] },
      { name: "マリンメッセ福岡A館", dates: ["2026年8月22日", "2026年8月23日"] },
      { name: "有明アリーナ", dates: ["2026年9月5日", "2026年9月6日"] }
    ];

    let currentSelectedVenue = "";
    let globalHistory = [];

    const container = document.getElementById('venue-options-container');
    const serialInput = document.getElementById('serial-input');
    const loader = document.getElementById('loader');

    function showView(id) {
      document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
      document.getElementById(id).classList.add('active');
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function formatDateLabel(dateStr) {
      const m = dateStr.match(/(\d{4})年(\d{1,2})月(\d{1,2})日/);
      if (!m) return dateStr;
      const year = Number(m[1]);
      const month = Number(m[2]);
      const day = Number(m[3]);
      const weekday = ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'][new Date(year, month - 1, day).getDay()];
      return `${year}.${month}.${day}[${weekday}]`;
    }

    function renderVenues() {
      container.innerHTML = '';
      venues.forEach(v => {
        v.dates.forEach(date => {
          const item = document.createElement('div');
          item.className = 'venue-item';
          const labelDate = formatDateLabel(date);
          item.dataset.label = `${labelDate} ${v.name} 公開リハーサルに応募する`;
          item.innerHTML = `<div><div class="date">${labelDate}</div><div class="name">${v.name} 公開リハーサルに応募する</div></div>`;
          item.addEventListener('click', () => {
            document.querySelectorAll('.venue-item').forEach(el => el.classList.remove('selected'));
            item.classList.add('selected');
            currentSelectedVenue = item.dataset.label;
            goToStep2();
          });
          container.appendChild(item);
        });
      });
    }

    function formatNow() {
      const d = new Date();
      const p = n => String(n).padStart(2, '0');
      return `${d.getFullYear()}/${p(d.getMonth()+1)}/${p(d.getDate())} ${p(d.getHours())}:${p(d.getMinutes())}:${p(d.getSeconds())}`;
    }

    function goToStep2() {
      if (!currentSelectedVenue) return;
      document.getElementById('selected-venue-display').textContent = `選択中： ${currentSelectedVenue}`;
      showView('view-step2');
      serialInput.focus();
    }

    function handleDraw() {
      const serial = serialInput.value.trim() || `CODE-${Math.floor(Math.random() * 9000)}`;
      loader.style.display = 'flex';

      setTimeout(() => {
        loader.style.display = 'none';
        const isWin = Math.random() < 0.3;
        const statusLabel = isWin ? '当選' : '落選';

        globalHistory.unshift({ serial, venue: currentSelectedVenue, time: formatNow(), status: statusLabel });

        document.getElementById('res-venue-name').textContent = currentSelectedVenue;
        const resStatus = document.getElementById('res-status');
        const resText = document.getElementById('res-text');

        if (isWin) {
          resStatus.className = 'status win';
          resStatus.textContent = '当選';
          resText.textContent = 'ご当選についてのご案内をご登録メールアドレスに送信しましたので必ずご確認いただきますようお願いいたします。';
        } else {
          resStatus.className = 'status lose';
          resStatus.textContent = '落選';
          resText.innerHTML = `落選内容: ${currentSelectedVenue}<br><br>別のシリアルコードでご応募される場合は、「応募ページトップに戻る」を選択してください。`;
        }

        showView('view-result');
      }, 800);
    }

    function showHistory() {
      const hContainer = document.getElementById('history-container');
      hContainer.innerHTML = '';

      if (globalHistory.length === 0) {
        hContainer.innerHTML = '<div style="color:#777;font-size:14px;line-height:1.6;">まだ応募履歴がありません。</div>';
      } else {
        globalHistory.forEach(item => {
          const card = document.createElement('div');
          card.className = 'history-card';
          card.innerHTML = `
            <div><span class="history-serial">${item.serial}</span><span class="history-time">${item.time}</span></div>
            <div class="history-title">TREASURE 2026 FAN CON [STAGE]</div>
            <div class="history-venue">${item.venue}</div>
            <div class="history-status" style="color:${item.status === '当選' ? 'var(--red)' : 'var(--blue)'}">${item.status}</div>
          `;
          hContainer.appendChild(card);
        });
      }

      showView('view-history');
    }

    function resetToHome(clearSelection = true) {
      serialInput.value = '';
      if (clearSelection) {
        currentSelectedVenue = '';
        document.querySelectorAll('.venue-item').forEach(el => el.classList.remove('selected'));
      }
      showView('view-step1');
    }

    document.getElementById('draw-btn').addEventListener('click', handleDraw);
    document.getElementById('back-btn').addEventListener('click', () => showView('view-step1'));
    document.getElementById('history-btn').addEventListener('click', showHistory);
    document.getElementById('home-btn').addEventListener('click', () => resetToHome(true));
    document.getElementById('new-entry-btn').addEventListener('click', () => resetToHome(true));
    document.getElementById('history-home-btn').addEventListener('click', () => resetToHome(true));

    serialInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') handleDraw();
    });

    renderVenues();
  </script>
</body>
</html>
